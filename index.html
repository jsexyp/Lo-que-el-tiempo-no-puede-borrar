<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Error 404</title>
<style>
    body {
        margin: 0;
        background-color: #0f0f0f;
        color: #eaeaea;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        text-align: center;
        max-width: 600px;
    }

    h1 {
        font-size: 5rem;
        margin-bottom: 10px;
        font-weight: 600;
    }

    p {
        font-size: 1.1rem;
        margin: 8px 0;
        line-height: 1.5;
        color: #cfcfcf;
    }

    .small {
        font-size: 0.9rem;
        margin-top: 20px;
        color: #888;
    }
</style>
</head>
<body>
    <div class="container">
        <h1>Error 404</h1>
        <p>No se pudo cargar el contenido solicitado.</p>
        <p>Es posible que la información haya sido eliminada, movida o nunca registrada.</p>
        <p class="small">Algunas historias no desaparecen. Solo dejan de mostrarse.</p>
    </div>
</body>
</html>
